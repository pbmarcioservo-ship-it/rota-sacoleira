kind = "web"
previewPath = "/"
title = "Rota Sacoleira"
version = "1.0.0"
id = "artifacts/rota-sacoleira"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23030

[services.development]
run = "pnpm --filter @workspace/rota-sacoleira run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rota-sacoleira", "run", "build" ]
publicDir = "artifacts/rota-sacoleira/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23030"
BASE_PATH = "/"
